<!--
  7thsense Master Contact Form Component — Tally.so
  ==================================================

  PURPOSE: Embeds the master Tally contact form into any client site.
  All submissions route to the 7thsense Tally dashboard with client
  attribution via the &source= parameter.

  USAGE:
  1. Copy the iframe into the contact section of the site
  2. Replace [CLIENT-NAME] with the client slug (e.g. "dr-sonday", "team24")
  3. Copy the script block before </body>
  4. NEVER build a custom contact form — use this component (CLAUDE.md Rule 16)

  FORM ID: 9qlQe4

  PARAMETERS:
  - alignLeft=1        Left-align form fields
  - hideTitle=1         Hide Tally form title (we use our own heading)
  - transparentBackground=1  Blend with site background
  - dynamicHeight=1    Auto-resize iframe to fit content
  - source=[CLIENT-NAME]  Hidden field for lead attribution
-->

<!-- EMBED THIS IN THE CONTACT SECTION -->
<iframe
  data-tally-src="https://tally.so/embed/9qlQe4?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1&source=[CLIENT-NAME]"
  loading="lazy"
  width="100%"
  height="205"
  frameborder="0"
  marginheight="0"
  marginwidth="0"
  title="Contact Form">
</iframe>

<!-- ADD THIS SCRIPT ONCE BEFORE </body> -->
<script>
var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){e.src=e.dataset.tallySrc})};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w;s.onload=v;s.onerror=v;d.body.appendChild(s);}
</script>
